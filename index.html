<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedCross — Medical Crossword</title>
  <meta name="description" content="MedCross is a medical crossword game for students and clinicians. Learn terminology the fun way." />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f8;
      color: #16232e;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0e1620; color: #eef4f8; }
      .card { background: #16222e !important; box-shadow: none !important; }
      .clue { color: #9fb3c2 !important; }
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border-radius: 22px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(20, 40, 60, 0.12);
    }
    .logo {
      width: 84px; height: 84px;
      border-radius: 20px;
      background: linear-gradient(135deg, #17a2a2, #0d7d8c);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    h1 { font-size: 28px; letter-spacing: -0.5px; margin-bottom: 6px; }
    .tag { font-size: 15px; color: #17a2a2; font-weight: 600; margin-bottom: 20px; }
    p { font-size: 16px; line-height: 1.5; color: #47606f; margin-bottom: 14px; }
    .clue { font-size: 13px; color: #7c94a4; margin-top: 24px; }
    a.btn {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 26px;
      background: #17a2a2;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
    }
    a.support { color: #17a2a2; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🩺</div>
    <h1>MedCross</h1>
    <div class="tag">Medical Crossword</div>
    <p>Learn medical terminology the fun way — a crossword game built for students and clinicians.</p>
    <a class="btn" href="https://apps.apple.com/app/id6761099081">Download on the App Store</a>
    <p class="clue">Support &amp; questions: <a class="support" href="mailto:yoavtoren@gmail.com">yoavtoren@gmail.com</a></p>
  </main>
</body>
</html>
