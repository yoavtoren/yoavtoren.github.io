<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedCross — Medical Crossword</title>
  <meta name="description" content="MedCross is a medical crossword game for students and clinicians. Learn terminology the fun way." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#17a2a2" />
  <meta property="og:title" content="MedCross — Medical Crossword" />
  <meta property="og:description" content="Learn medical terminology the fun way — a crossword game built for students and clinicians." />
  <meta property="og:image" content="https://yoavtoren.github.io/icon-light-512.png" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f8;
      color: #16232e;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0e1620; color: #eef4f8; }
      .card { background: #16222e !important; box-shadow: none !important; }
      .clue { color: #9fb3c2 !important; }
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: #ffffff;
      border-radius: 22px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(20, 40, 60, 0.12);
    }
    .logo-wrap {
      position: relative;
      width: 112px; height: 112px;
      margin: 0 auto 22px;
    }
    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: radial-gradient(closest-side, rgba(23, 162, 162, 0.28), transparent 70%);
      z-index: 0;
    }
    .logo {
      position: relative;
      z-index: 1;
      width: 112px; height: 112px;
      border-radius: 26px;
      display: block;
      box-shadow:
        0 18px 36px -14px rgba(13, 125, 140, 0.45),
        0 2px 6px rgba(20, 40, 60, 0.12);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease;
      animation: logo-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .logo-wrap:hover .logo {
      transform: translateY(-4px) scale(1.03) rotate(-1.5deg);
      box-shadow:
        0 26px 48px -16px rgba(13, 125, 140, 0.55),
        0 3px 8px rgba(20, 40, 60, 0.14);
    }
    @keyframes logo-in {
      from { opacity: 0; transform: translateY(10px) scale(0.94); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .logo { animation: none; transition: none; }
    }
    h1 { font-size: 28px; letter-spacing: -0.5px; margin-bottom: 6px; }
    .tag { font-size: 15px; color: #17a2a2; font-weight: 600; margin-bottom: 20px; }
    p { font-size: 16px; line-height: 1.5; color: #47606f; margin-bottom: 14px; }
    .clue { font-size: 13px; color: #7c94a4; margin-top: 24px; }
    a.btn {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 26px;
      background: #17a2a2;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
    }
    a.support { color: #17a2a2; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo-wrap">
      <picture>
        <source srcset="icon-dark-512.png" media="(prefers-color-scheme: dark)" />
        <img class="logo" src="icon-light-512.png" alt="MedCross app icon — crossword tiles spelling MEDCROSS" width="112" height="112" />
      </picture>
    </div>
    <h1>MedCross</h1>
    <div class="tag">Medical Crossword</div>
    <p>Learn medical terminology the fun way — a crossword game built for students and clinicians.</p>
    <a class="btn" href="https://apps.apple.com/app/id6761099081">Download on the App Store</a>
    <p class="clue">Support &amp; questions: <a class="support" href="mailto:yoavtoren@gmail.com">yoavtoren@gmail.com</a></p>
  </main>
</body>
</html>
